<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results - Generic Medicines</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" id="theme-style">
    <script defer src="{{ url_for('static', filename='js/script.js') }}"></script>
</head>
<body>

    <header class="navbar">
        <h1>Search Results</h1>
    </header>

    <section class="results-section">
        {% if medicines %}
            {% for medicine in medicines %}
                <div class="medicine-card">
                    <h2>{{ medicine.name }}</h2>
                    <p>Generic Name: {{ medicine.generic_name }}</p>
                    <p>Price: {{ medicine.price }}</p>
                    <a href="{{ medicine.details_link }}">View Details</a>
                </div>
            {% endfor %}
        {% else %}
            <p style="text-align:center;">No medicines found for your search.</p>
        {% endif %}
    </section>

    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>

</body>
</html>
