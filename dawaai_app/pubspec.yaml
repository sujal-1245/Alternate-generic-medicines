name: dawaai_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  geolocator: ^13.0.4
  lottie: ^3.1.0
  url_launcher: ^6.1.12
  http: ^1.5.0
  cupertino_icons: ^1.0.8
  google_maps_flutter: ^2.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.2

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo/dawaai.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo/dawaai.png"

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/Capsule.json
    - assets/logo/dawaai.png